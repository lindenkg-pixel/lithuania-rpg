<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="theme-color" content="#1a1a2a">
<title>リトアニア音楽紀行</title>
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#0e0e1a;color:#fff;font-family:system-ui,-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;overscroll-behavior:none;}
  /* ページ全体は viewport 内に収め、スクロールさせない（操作ボタンが画面外に行かないように） */
  html,body{height:100%;overflow:hidden;}
  body{display:flex;flex-direction:column;align-items:center;height:100dvh;padding:8px;touch-action:manipulation;}
  #game-root{width:100%;max-width:380px;height:100%;display:flex;flex-direction:column;user-select:none;-webkit-user-select:none;}
  /* キャンバスは正方形を維持。縦が足りない端末では縮小するが、十字キーは必ず見えるようにする */
  #screen{width:100%;aspect-ratio:1/1;max-height:56vh;display:block;background:#000;border-radius:8px;image-rendering:pixelated;border:1px solid #333;touch-action:none;flex:0 1 auto;min-height:0;}
  /* ダイアログはコンパクトに。長文は内側スクロールで吸収して、下のボタンを押し出さない */
  #dialog{flex:1 1 auto;min-height:50px;max-height:22vh;overflow-y:auto;background:#1a1a2a;border:1px solid #333;border-radius:8px;padding:8px 12px;margin-top:6px;font-size:13px;line-height:1.55;color:#fff;-webkit-overflow-scrolling:touch;}
  /* ニューゲーム（名前/見た目入力）中はキャンバスを縮め、入力フォーム側を広げる */
  body.newgame-mode #screen{max-height:30vh;}
  body.newgame-mode #dialog{max-height:50vh;}
  /* 戦闘中はキャンバスは縮めない（戦闘ビジュがつぶれるため）。
     コマンドが見切れる場合は内側スクロール＋カーソル自動スクロールで対応する */
  body.battle-mode #dialog{max-height:none;flex:1 1 auto;overflow-y:auto;}
  /* 戦闘コマンドボタンを少し詰めて、見える範囲を増やす */
  body.battle-mode #dialog button{padding:4px 6px !important;font-size:11px !important;}
  #status{flex:none;display:flex;justify-content:space-between;font-size:11px;color:#aaa;margin-top:4px;padding:0 4px;}
  #controls{flex:none;display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px;align-items:center;}
  #dpad{display:grid;grid-template-columns:repeat(3,52px);grid-template-rows:repeat(3,52px);gap:5px;justify-self:center;}
  .pad{font-size:18px;background:#222;border:1px solid #555;border-radius:10px;color:#fff;cursor:pointer;touch-action:none;}
  .pad:active{background:#333;}
  .act{width:130px;height:52px;font-size:15px;background:#1a1a2a;border:1px solid #555;border-radius:10px;color:#fff;cursor:pointer;}
  .act:active{background:#333;}
  .right-col{display:flex;flex-direction:column;gap:8px;align-items:center;}
  button:focus{outline:none;}
</style>
</head>
<body>
<div id="game-root">
  <canvas id="screen" width="384" height="384"></canvas>
  <div id="dialog">Aを押してはじめる</div>
  <div id="status"></div>
  <div id="controls">
    <div id="dpad">
      <div></div><button data-dir="up" class="pad">▲</button><div></div>
      <button data-dir="left" class="pad">◀</button><div></div><button data-dir="right" class="pad">▶</button>
      <div></div><button data-dir="down" class="pad">▼</button><div></div>
    </div>
    <div class="right-col">
      <button id="btnA" class="act">A 決定</button>
      <button id="btnB" class="act">B メニュー</button>
    </div>
  </div>
</div>
<script src="js/game.js?v=20260504l"></script>
</body>
</html>
